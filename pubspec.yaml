name: schat
description: SChat - Your Personal Messenger
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Matrix SDK
  matrix: ^0.25.0

  # Navigation
  go_router: ^13.0.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  emoji_picker_flutter: ^2.2.0

  # WebRTC (Calls)
  flutter_webrtc: ^0.10.4
  matrix_api_lite: ^1.6.0

  # Media
  just_audio: ^0.9.38
  record: ^5.1.0
  video_player: ^2.8.6
  file_picker: ^8.0.0

  # Storage
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3
  path_provider: ^2.1.3

  # Auth & Utils
  google_sign_in: ^6.2.1
  local_auth: ^2.2.0
  permission_handler: ^11.3.1
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  intl: ^0.19.0
  timeago: ^3.6.1
  uuid: ^4.4.0
  crypto: ^3.0.3

  # Notifications
  flutter_local_notifications: ^17.2.2
  firebase_messaging: ^15.1.0
  firebase_core: ^3.4.0

  # Network
  http: ^1.2.1
  dio: ^5.4.3
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
